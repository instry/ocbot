<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ocbot</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at top, rgba(124, 58, 237, 0.16), transparent 36%),
        linear-gradient(180deg, #faf7ff 0%, #f3efff 100%);
      color: #2f243d;
      font: 400 14px/1.5 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      overflow: hidden;
    }

    #root {
      width: 100%;
      height: 100%;
    }

    .boot-screen {
      display: flex;
      width: 100%;
      height: 100%;
      align-items: center;
      justify-content: center;
    }

    .boot-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 28px 32px;
      border: 1px solid rgba(124, 58, 237, 0.12);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 18px 60px rgba(91, 33, 182, 0.12);
      backdrop-filter: blur(18px);
    }

    .boot-spinner {
      width: 30px;
      height: 30px;
      border-radius: 9999px;
      border: 3px solid rgba(124, 58, 237, 0.14);
      border-top-color: #8b5cf6;
      animation: boot-spin 0.9s linear infinite;
    }

    .boot-text {
      font-size: 14px;
      color: #4c1d95;
      letter-spacing: 0.01em;
    }

    @keyframes boot-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="boot-screen">
      <div class="boot-card">
        <div class="boot-spinner"></div>
        <div class="boot-text">Starting Ocbot…</div>
      </div>
    </div>
  </div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
